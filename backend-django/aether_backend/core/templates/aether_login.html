<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AÉTHER | Connexion</title>
   <style>
/* RESET PRO */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* HTML + BODY FIX POUR IFRAME */
html, body {
    height: 100%;
}

/* BODY */
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    min-height: 100%;
    padding: 15px;
}

/* CARD */
.login-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    width: 100%;
    max-width: 340px;
    text-align: center;
}

/* TITRE */
.login-card h2 {
    margin-bottom: 15px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.9);
    font-size: 14px;
}

/* INPUT FOCUS */
input:focus {
    outline: none;
    box-shadow: 0 0 0 2px #39b7c7;
}

/* BOUTON */
button {
    width: 100%;
    padding: 14px;
    background: #39b7c7;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}

/* HOVER */
button:hover {
    background: #2fa5b5;
}

/* DISABLED */
button:disabled {
    background: #555;
    cursor: not-allowed;
}
</style>
</head>
<body>
    <div class="login-card">
        <h2>AÉTHER AI</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit" id="btnSubmit">Se connecter</button>
        </form>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ================= CONFIG ================= */
const PARENT_ORIGIN = "http://127.0.0.1:5501";

const _supabase = supabase.createClient(
    "{{ SUPABASE_URL }}",
    "{{ SUPABASE_ANON_KEY }}"
);

/* ================= READY SIGNAL ================= */
window.onload = () => {
    console.log("AÉTHER prêt → demande session au parent");
    window.parent.postMessage({ type: 'AETHER_READY' }, PARENT_ORIGIN);
};

/* ================= COMMUNICATION AVEC SPL ================= */
window.addEventListener('message', async (event) => {
    if (event.origin !== PARENT_ORIGIN) return;
    if (!event.data || !event.data.type) return;

    const { type, session } = event.data;

    switch (type) {

        case 'SET_SESSION':
            console.log("Session reçue depuis SPL");

            const { error } = await _supabase.auth.setSession(session);

            if (!error) {
                console.log("Connexion AÉTHER réussie");
                window.location.href = '/';
            } else {
                console.error("Erreur session:", error.message);
            }
        break;

        case 'LOGOUT':
            console.log("Déconnexion demandée");

            await _supabase.auth.signOut();
            window.location.reload();
        break;
    }
});

/* ================= LOGIN MANUEL ================= */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('btnSubmit');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        alert("Veuillez remplir les champs.");
        return;
    }

    btn.innerText = "Connexion...";
    btn.disabled = true;

    const { data, error } = await _supabase.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        alert("Erreur : " + error.message);
        btn.innerText = "Se connecter";
        btn.disabled = false;
        return;
    }

    // 🔥 SSO → envoyer session au parent (SPL)
    const session = data.session;

    window.parent.postMessage({
        type: 'SET_SESSION',
        session: {
            access_token: session.access_token,
            refresh_token: session.refresh_token
        }
    }, PARENT_ORIGIN);

    window.location.replace('/');
});
</script>
</body>
</html>
