<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 1. Initialisation Supabase
    const supabaseUrl = "https://ccsrxvwaxkdbphesyies.supabase.co";
    const supabaseKey = "sb_publishable_SqgQjncAuFW7c5buXtpdsw_oWUuez1z";
    const sp_client = supabase.createClient(supabaseUrl, supabaseKey);

    let userRole = 'GUEST';
    window.supabaseClient = sp_client;

    // 2. Écouter les messages venant de l'Iframe (AÉTHER)
    window.addEventListener('message', async (event) => {
        // Sécurité : On accepte uniquement les messages de Django (port 8000)
        if (event.origin !== 'http://127.0.0.1:8000') return;

        // Si AÉTHER dit qu'il est prêt, on lui envoie la session
        if (event.data.type === 'AETHER_READY') {
    const { data: { session } } = await sp_client.auth.getSession();

    if (session) {
        const iframe = document.querySelector('#aether-chat-window iframe');

        iframe.contentWindow.postMessage({
            type: 'SET_SESSION',
            session: {
                access_token: session.access_token,
                refresh_token: session.refresh_token
            }
        }, 'http://127.0.0.1:8000');
    }
}
    });

    // 3. Charger le rôle au démarrage
    async function chargerDonneesAether() {
        try {
            const { data: { session } } = await sp_client.auth.getSession();
            if (session) {
                const { data: profile } = await sp_client
                    .from('utilisateur')
                    .select('role_user')
                    .eq('auth_id', session.user.id)
                    .single();
                if (profile) userRole = profile.role_user;
            }
        } catch (e) { console.log("Mode invité."); }
    }
    chargerDonneesAether();

    // 4. Fonction pour ouvrir/fermer la bulle
    function toggleAether() {
        const windowChat = document.getElementById('aether-chat-window');
        const icon = document.getElementById('aether-icon');

        if (windowChat.style.display === 'none' || windowChat.style.display === '') {
            windowChat.style.display = 'flex';
            icon.innerText = (userRole === 'ROOT') ? '👑' : '✕';
        } else {
            windowChat.style.display = 'none';
            icon.innerText = '✨';
        }
        async function logout() {
    await sp_client.auth.signOut();
    
    // On prévient l'Iframe AÉTHER de se déconnecter aussi
    const iframe = document.querySelector('#aether-chat-window iframe');
    if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({ type: 'LOGOUT' }, 'http://127.0.0.1:8000');
    }
    
    window.location.reload(); // Recharge le front
}
    }

    sp_client.auth.onAuthStateChange((event, session) => {
    const iframe = document.querySelector('#aether-chat-window iframe');

    if (iframe && iframe.contentWindow && session) {
        iframe.contentWindow.postMessage({
            type: 'SET_SESSION',
            session: {
                access_token: session.access_token,
                refresh_token: session.refresh_token
            }
        }, 'http://127.0.0.1:8000');
    }
});
</script>
