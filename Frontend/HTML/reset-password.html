<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réinitialiser le mot de passe | SPL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        /* ===== LOGIN CARD ===== */
        .login-card {
            position: relative;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            overflow: hidden;
        }

        /* ===== BACKGROUND IMAGE ===== */
        .login-card::before {
            content: "";
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url('../Images/Image1.png');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.6);
            transform: scale(1.1);
            z-index: -1;
        }

        /* ===== TITLE ===== */
        .login-card h2 {
            color: #e5efff;
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* ===== FORM ELEMENTS ===== */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #f0f2f5;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: #39b7c7;
            box-shadow: 0 0 10px rgba(57,183,199,0.3);
        }

        /* ===== PASSWORD TOGGLE ===== */
        #togglePassword {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #39b7c7;
        }

        /* ===== BUTTON ===== */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e96a5, #39b7c7);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 5px 15px rgba(57,183,199,0.3);
        }

        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #39b7c7, #50c8d7);
            box-shadow: 0 10px 25px rgba(57,183,199,0.5);
        }

        /* ===== LINKS ===== */
        .links {
            text-align: center;
            margin-top: 18px;
            font-size: 0.85rem;
            color: #e5efff;
        }

        .links a {
            color: #39b7c7;
            text-decoration: none;
            transition: 0.3s;
        }

        .links a:hover {
            text-decoration: underline;
            color: #50c8d7;
        }

        /* ===== ICON SPL ===== */
        .icone-spl img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            padding: 8px;
            margin: 0 auto 20px auto;
            display: block;
        }
/* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-card {
                padding: 25px 20px;
            }

            .login-card h2 {
                font-size: 1.5rem;
            }

            #togglePassword {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2>Réinitialiser le mot de passe</h2>

    <div class="icone-spl">
        <img src="../Images/Image1.png" alt="Logo SPL">
    </div>

    <form id="resetForm">
        <div class="form-group password-container">
            <label for="newPassword">Nouveau mot de passe</label>
            <input type="password" id="newPassword" placeholder="••••••••" required>
            <span id="togglePassword">👁</span>
        </div>
        <button type="submit">Réinitialiser le mot de passe</button>
    </form>

    <div class="links">
        Retour à <a href="login.html">Connexion</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
   const SUPABASE_URL = "https://ccsrxvwaxkdbphesyies.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_SqgQjncAuFW7c5buXtpdsw_oWUuez1z";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// Récupérer le token dans l’URL
const urlParams = new URLSearchParams(window.location.search);
const accessToken = urlParams.get('access_token');
const refreshToken = urlParams.get('refresh_token');

if (!accessToken || !refreshToken) {
  alert("Lien invalide ou expiré.");
} else {
  // Initialiser la session avec les tokens
  await supabaseClient.auth.setSession({
    access_token: accessToken,
    refresh_token: refreshToken
  });
}

// Toggle mot de passe
const passwordInput = document.getElementById("newPassword");
const togglePassword = document.getElementById("togglePassword");
togglePassword.addEventListener("click", () => {
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    togglePassword.textContent = "🙈";
  } else {
    passwordInput.type = "password";
    togglePassword.textContent = "👁";
  }
});

// Formulaire de réinitialisation
document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const newPassword = passwordInput.value.trim();
  if (!newPassword) {
    alert("Veuillez entrer un mot de passe.");
    return;
  }

  try {
    const { error } = await supabaseClient.auth.updateUser({
      password: newPassword
    });

    if (error) {
      alert("Erreur : " + error.message);
      return;
    }

    alert("Mot de passe réinitialisé avec succès !");
    window.location.href = "login.html";
  } catch (err) {
    console.error("Erreur inattendue :", err);
    alert("Une erreur est survenue.");
  }
});

</script>

</body>
</html>
