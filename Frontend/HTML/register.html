<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spirit-s-Line | Inscription</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .register-card { background:white; padding:40px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:100%; max-width:400px; }
    h2 { text-align:center; color:#1e293b; margin-bottom:25px; }
    .form-group { margin-bottom:15px; }
    label { display:block; margin-bottom:5px; color:#64748b; font-size:0.9rem; }
    input { width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:8px; box-sizing:border-box; outline:none; transition:0.3s; }
    input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
    button { width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px; transition:0.3s; }
    button:hover { background:#1d4ed8; }
    .login-link { text-align:center; margin-top:20px; font-size:0.9rem; color:#64748b; }
    .login-link a { color:#2563eb; text-decoration:none; font-weight:bold; }
    .icone-spl img { width:70px; height:70px; border-radius:50%; background:white; padding:8px; display:block; margin:0 auto 12px; }
  </style>
</head>
<body>
 <div class="register-card">
  <h2>Créer un compte</h2>

  <div class="icone-spl">
    <img src="../Images/Image1.png" alt="Logo SPL">
  </div>

  <form id="registerForm" autocomplete="off">
    <!-- Pseudo -->
    <div class="form-group">
      <label for="username">Nom d'utilisateur (Pseudo)</label>
      <input type="text" id="username" placeholder="Ex: The_SPIRIT" required>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="ex: vous@exemple.com" required>
    </div>

    <!-- Nom -->
    <div class="form-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" placeholder="Ex: AKONO" required>
    </div>

    <!-- Prénom -->
    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" placeholder="Ex: Ezer" required>
    </div>

    <!-- Téléphone -->
    <div class="form-group">
      <label for="telephone">Numéro de téléphone</label>
      <input type="tel" id="telephone" placeholder="Ex: 0612345678" required>
    </div>

    <!-- Mot de passe -->
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <!-- Bouton -->
    <button type="submit">S'inscrire</button>
  </form>

  <!-- Lien vers login -->
  <div class="login-link">
    Déjà un compte ? <a href="login.html">Se connecter</a>
  </div>
</div>

  <!-- 1) Charger la librairie Supabase -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ccsrxvwaxkdbphesyies.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_SqgQjncAuFW7c5buXtpdsw_oWUuez1z"; // Remplace par ta clé ANON

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

(function initRegister() {
  const form = document.getElementById('registerForm');
  if (!form) return;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = (document.getElementById('username').value || '').trim();
    const email = (document.getElementById('email').value || '').trim();
    const nom = (document.getElementById('nom').value || '').trim();
    const prenom = (document.getElementById('prenom').value || '').trim();
    const telephone = (document.getElementById('telephone').value || '').trim();
    const password = (document.getElementById('password').value || '').trim();

    if (!username || !email || !password) {
      alert('Veuillez renseigner au minimum : pseudo, email et mot de passe.');
      return;
    }

    try {
      // 1️⃣ Création Auth User
      const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
        email, 
        password
      });

      if (signUpError) {
        alert('Erreur inscription : ' + signUpError.message);
        return;
      }

      const userId = signUpData?.user?.id;
      if (!userId) {
        alert('Impossible de récupérer l’ID utilisateur après inscription.');
        return;
      }

      // 2️⃣ Création profil SPL
      const { error: insertError } = await supabaseClient
        .from('utilisateur')
        .insert([{
          auth_id: userId,
          pseudo_user: username,
          mail_user: email,
          nom_user: nom,
          prenom_user: prenom,
          num_user: telephone,
          role_user: 'client',
          created_at: new Date()
        }]);

      if (insertError) {
        alert('Erreur création profil SPL : ' + insertError.message);
        return;
      }

      alert('Inscription réussie ! Vérifie ta boîte mail si nécessaire.');
      window.location.href = 'login.html';

    } catch (err) {
      console.error('Erreur lors de l’inscription :', err);
      alert('Erreur serveur ou réseau. Vérifie ton URL Supabase et ta clé ANON.');
    }
  });
})();
</script>
</body>
</html>
