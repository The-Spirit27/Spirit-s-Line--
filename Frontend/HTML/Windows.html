<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="../CSS/Refection.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activation - SPIRIT</title>
</head>

<body>
  <div class="container24">
  <header><strong>Activation Windows</strong></header>
   <form id="formulaire">
            <input type="hidden" id="serviceAffiche" value="Activation Windows">
            
            <input type="hidden" id="nom">
            <input type="hidden" id="prenom">
            <input type="hidden" id="numero">

            <h2 style="color: var(--neon-green);">Détails de la demande</h2>

               <label for="marque">Modèle de l'ordinateur</label>
    <select name="marque" id="marque" required>
      <option value="">-- Choisir le Modèle --</option>
      <option value="HP">HP</option>
      <option value="DELL">DELL</option>
      <option value="LENOVO">LENOVO</option>
      <option value="MICROSOFT">MICROSOFT</option>
      <option value="SAMSUNG">SAMSUNG</option>
      <option value="Autre">Autre...</option>
    </select>

            <input type="text" id="autreMarque" name="autreMarque" placeholder="Entrez la marque" style="display:none; margin-top:10px;">

            <label for="detailsDemande" style="margin-top:25px; display:block;">Précisions sur le type d'activation :</label>
            <textarea id="detailsDemande" placeholder="Ex: Activation de windows dans mon..." required></textarea>

            <button type="button" id="valider" style="margin-top: 20px;">Valider la commande</button>
        </form>
        <div id="synthese" style="display:none; margin-top:20px; color: white;">
            <h3>Vérifiez vos informations</h3>
            <p><strong>Service:</strong> <span id="rService"></span></p>
            <p><strong>Mail:</strong> <span id="rNom"></span></p>
            <p><strong>Marque:</strong> <span id="rMarque"></span></p>
            <p><strong>Détails:</strong> <span id="rDetails"></span></p>
            
            <div class="buttons">
                <button type="button" id="confirmer">Confirmer & WhatsApp</button>
                <button type="button" id="modifier">Modifier</button>
            </div>
        </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://ccsrxvwaxkdbphesyies.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_SqgQjncAuFW7c5buXtpdsw_oWUuez1z";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

const PRIX_SERVICE = 15000;

const safeGet = id => document.getElementById(id);

// 🔐 Vérifier session
async function verifierSession() {
  try {
    const { data, error } = await supabaseClient.auth.getSession();

    if (error || !data.session || !data.session.user) {
      window.location.href = "login.html";
      return null;
    }

    const user = data.session.user;

    return {
      email: user.email,
      id: user.id,
      username: user.user_metadata?.full_name || user.email
    };

  } catch (e) {
    console.error(e);
    window.location.href = "login.html";
    return null;
  }
}

// ✅ Validation
function formulaireValide() {
  const marque = safeGet('marque').value;
  const details = safeGet('detailsDemande').value;

  if (!marque || !details) {
    alert("⚠️ Remplis tous les champs");
    return false;
  }

  if (marque === "Autre" && !safeGet('autreMarque').value) {
    alert("⚠️ Précise la marque");
    return false;
  }

  return true;
}

// 📊 Synthèse
function preparerSynthese(user) {
  const service = safeGet('serviceAffiche').value;

  const marqueSelect = safeGet('marque');
  const marque = marqueSelect.value === 'Autre'
    ? safeGet('autreMarque').value
    : marqueSelect.value;

  const details = safeGet('detailsDemande').value;

  safeGet('rService').textContent = service;
  safeGet('rNom').textContent = user.username;
  safeGet('rMarque').textContent = marque;
  safeGet('rDetails').textContent = details;
  safeGet('rPrix').textContent = PRIX_SERVICE + " Fcfa";

  safeGet('formulaire').style.display = 'none';
  safeGet('synthese').style.display = 'block';
}

// 🚀 Envoi
async function envoyerRequete(user) {
  try {
    const service = safeGet('rService').textContent;
    const marque = safeGet('rMarque').textContent;
    const details = safeGet('rDetails').textContent;
    const prix = safeGet('rPrix').textContent;

    // 🔍 utilisateur
    const { data: utilisateur, error: errUser } = await supabaseClient
      .from('utilisateur')
      .select('mat_user, pseudo_user, mail_user')
      .eq('mail_user', user.email)
      .maybeSingle();

    if (errUser || !utilisateur) {
      console.error(errUser);
      return alert("Utilisateur introuvable.");
    }

    // 🔍 compte
    const { data: compte, error: errCompte } = await supabaseClient
      .from('compte')
      .select('num_cpt')
      .eq('mat_user', utilisateur.mat_user)
      .maybeSingle();

    if (errCompte || !compte) {
      console.error(errCompte);
      return alert("Compte introuvable.");
    }

    // 📦 requête
    const dossier = {
      nom_rqt: service,
      lib_rqt: `Marque: ${marque}\nDétails: ${details}`,
      num_cpt: compte.num_cpt,
      prix: PRIX_SERVICE,
      status: 'pending',
      progress: 0,
      date_rqt: new Date().toISOString()
    };

    const { error: insertErr } = await supabaseClient
      .from('requete')
      .insert([dossier]);

    if (insertErr) {
      console.error(insertErr);
      return alert("Erreur insertion");
    }

    // 📲 WhatsApp
    const phone = '241074849344';
    const msg = `Bonjour SPIRIT, je suis ${utilisateur.pseudo_user}.
Service: ${service}
Marque: ${marque}
Détails: ${details}
Prix: ${prix}`;

    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');

    alert("✅ Requête envoyée !");
    window.location.href = 'dashboard.html';

  } catch (e) {
    console.error(e);
    alert("Erreur inattendue");
  }
}

// 🎯 INIT
document.addEventListener('DOMContentLoaded', async () => {
  const user = await verifierSession();
  if (!user) return;

  const marqueSelect = safeGet('marque');
  const autreChamp = safeGet('autreMarque');
// Autre marque
  marqueSelect.addEventListener('change', () => {
    autreChamp.style.display = marqueSelect.value === 'Autre' ? 'block' : 'none';
    autreChamp.required = marqueSelect.value === 'Autre';
  });

  // Boutons
  safeGet('valider').addEventListener('click', () => {
    if (!formulaireValide()) return;
    preparerSynthese(user);
  });

  safeGet('modifier').addEventListener('click', () => {
    safeGet('formulaire').style.display = 'block';
    safeGet('synthese').style.display = 'none';
  });

  safeGet('confirmer').addEventListener('click', () => envoyerRequete(user));
});
</script>
</body>
