<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit-s-Line | Connexion</title>
    <style>
   /* ===== GLOBAL ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* ===== LOGIN CARD ===== */
.login-card {
    position: relative;
    padding: 40px 30px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 380px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    text-align: center;
    overflow: hidden;
}

/* ===== BACKGROUND IMAGE ===== */
.login-card::before {
    content: "";
    position: absolute;
    top: -10%;
    left: -10%;
    width: 120%;
    height: 120%;
    background-image: url('../Images/Image1.png');
    background-size: cover;
    background-position: center;
    filter: blur(15px) brightness(0.6);
    transform: scale(1.1);
    z-index: -1;
}

/* ===== TITLE ===== */
.login-card h2 {
    color: #e5efff;
    margin-bottom: 30px;
    font-size: 1.8rem;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

/* ===== FORM ELEMENTS ===== */
.form-group {
    margin-bottom: 20px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 6px;
    color: #f0f2f5;
    font-size: 0.9rem;
}

input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    outline: none;
    box-sizing: border-box;
    transition: 0.3s;
}

input:focus {
    border-color: #39b7c7;
    box-shadow: 0 0 10px rgba(57,183,199,0.3);
}

/* ===== PASSWORD TOGGLE ===== */
.password-container {
    position: relative;
}

.password-container input {
    padding-right: 45px;
}

#togglePassword {
    position: absolute;
   margin-right: 27px;
    top: 350px;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #39b7c7;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1e96a5, #39b7c7);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 5px 15px rgba(57,183,199,0.3);
}

button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #39b7c7, #50c8d7);
    box-shadow: 0 10px 25px rgba(57,183,199,0.5);
}

/* ===== LINKS ===== */
.links {
    text-align: center;
    margin-top: 18px;
    font-size: 0.85rem;
    color: #e5efff;
}

.links a {
    color: #39b7c7;
    text-decoration: none;
    transition: 0.3s;
}

.links a:hover {
    text-decoration: underline;
    color: #50c8d7;
}

/* ===== ICON SPL ===== */
.icone-spl img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: white;
    padding: 8px;
    margin: 0 auto 20px auto;
    display: block;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
    .login-card {
        padding: 25px 20px;
    }

    .login-card h2 {
        font-size: 1.5rem;
    }

    .password-container input {
        padding-right: 40px;
    }

    #togglePassword {
        right: 10px;
        font-size: 16px;
    }
}

    </style>
</head>
<body>
<div class="login-card">
    <h2>Connexion à SPL</h2>

    <div class="icone-spl">
        <img src="../Images/Image1.png" alt="Logo SPL">
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">E-mail</label>
            <input type="email" id="username" placeholder="E-mail" required>
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <span id="togglePassword">👁</span>
        </div>

        <button type="submit">Se connecter</button>
        <div class="forgot-password">
    <a href="#" id="forgotPasswordLink">Mot de passe oublié ?</a>
</div>
    </form>

    <div class="links">
        Pas encore de compte ? <a href="register.html">S'inscrire</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://ccsrxvwaxkdbphesyies.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_SqgQjncAuFW7c5buXtpdsw_oWUuez1z"
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      alert('Veuillez renseigner les champs.');
      return;
    }

    try {
      // Connexion Supabase Auth
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        alert('Échec : ' + error.message);
        return;
      }

      const user = data.user;
      const session = data.session;

      // 🔥 ENVOI DE LA SESSION À AÉTHER (SSO)
const iframe = window.opener || window.parent;

if (iframe) {
  iframe.postMessage({
    type: 'SET_SESSION',
    session: {
      access_token: session.access_token,
      refresh_token: session.refresh_token
    }
  }, 'https://spirit-s-line.online');
}

      // --- Récupération du rôle depuis la table utilisateur ---
      const { data: profile, error: profileError } = await supabaseClient
        .from('utilisateur')          // <-- ici ta table SPL
        .select('role_user')          // <-- colonne de rôle
        .eq('auth_id', user.id)       // <-- lien avec auth.users.id
        .single();

      if (profileError) {
        console.warn("Erreur profil:", profileError.message);
      }

      const roleFinal = profile ? profile.role_user : 'client';

      // --- Enregistrement dans le localStorage ---
      const userData = {
        id: user.id,
        email: user.email,
        role: roleFinal
      };
      
      localStorage.setItem('userData', JSON.stringify(userData));

      // --- Redirection ---
      if (roleFinal === 'ROOT') {
        alert("Bienvenue Maître SPIRIT 🖤❄️");
        window.location.replace('../../index.html');
      } else {
        alert("Connexion réussie !");
        window.location.replace('../../index.html');
      }

    } catch (err) {
      console.error("Erreur inattendue:", err);
    }
  });

  const passwordInput = document.getElementById("password")
const togglePassword = document.getElementById("togglePassword")

togglePassword.addEventListener("click", () => {

  if(passwordInput.type === "password"){
    passwordInput.type = "text"
    togglePassword.textContent = "🙈"
  } else {
    passwordInput.type = "password"
    togglePassword.textContent = "👁"
  }

})
document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
  e.preventDefault();

  const email = document.getElementById('username').value.trim();

  if (!email) {
    alert("Veuillez entrer votre e-mail pour réinitialiser le mot de passe.");
    return;
  }

  try {
    const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/Frontend/HTML/reset-password.html' // page de reset si tu veux
    });

    if (error) {
      alert("Erreur : " + error.message);
    } else {
      alert("Un e-mail de réinitialisation a été envoyé si l'adresse est valide !");
    }
  } catch (err) {
    console.error("Erreur réinitialisation :", err);
    alert("Une erreur est survenue. Veuillez réessayer plus tard.");
  }
});
</script>
</body>
</html>
