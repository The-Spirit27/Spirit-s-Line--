<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuration - SPIRIT</title>
  <style>
 /* ================= ANIMATIONS ================= */

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes glowPulse {
  0% { box-shadow: 0 0 10px rgba(57,183,199,0.4); }
  50% { box-shadow: 0 0 25px rgba(57,183,199,0.8); }
  100% { box-shadow: 0 0 10px rgba(57,183,199,0.4); }
}

/* ================= BODY ================= */

body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 20px;
  background: linear-gradient(180deg, #0a0a0a, #1f1f1f);
  color: #f5f5f5;
}

/* ================= CONTAINER ================= */

.container21 {
  width: 90%;
  max-width: 650px;
  margin: 60px auto;

  background: linear-gradient(0deg, rgb(96, 156, 132) 0%, rgb(255, 255, 255) 100%);
  padding: 30px;
  border-radius: 18px;

  box-shadow: 0 15px 40px rgba(0,0,0,0.3);

  color: #000;

  animation: fadeInUp 0.9s ease;
  transition: 0.4s;
}

/* Effet hover container */
.container21:hover {
  transform: translateY(-5px) scale(1.01);
}

/* ================= HEADER ================= */

header {
  text-align: center;
  font-size: 1.4rem;
  margin-bottom: 25px;

  color: #0a0a0a;

  border-bottom: 2px solid rgb(57,183,199);
  padding-bottom: 10px;

  animation: fadeInDown 1s ease;
}

/* ================= FORM ================= */

form {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* Labels */
label {
  font-weight: bold;
  margin-bottom: 5px;
}

/* Inputs modernes */
input, select, textarea {
  width: 100%;
  padding: 12px;

  font-size: 1rem;
  border-radius: 10px;

  border: 1px solid #ccc;

  font-family: 'Segoe UI', sans-serif;

  transition: 0.3s;
}

/* Focus stylé */
input:focus, select:focus, textarea:focus {
  border-color: rgb(57,183,199);
  outline: none;

  box-shadow: 0 0 10px rgba(57,183,199,0.4);
  transform: scale(1.02);
}

/* ================= BOUTONS ================= */

.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 12px;

  font-size: 1rem;

  border: none;
  border-radius: 10px;
  background: linear-gradient(0deg, rgb(96, 156, 132) 0%, rgb(255, 255, 255) 100%);  color: white;

  cursor: pointer;

  transition: 0.3s;
  box-shadow: 0 0 12px rgba(57,183,199,0.5);
}

/* Hover stylé */
button:hover {
  transform: translateY(-4px) scale(1.05);
  background: linear-gradient(135deg, rgb(80,200,215), rgb(40,150,165));

  animation: glowPulse 1.5s infinite;
}

/* Click */
button:active {
  transform: scale(0.95);
}

/* ================= SYNTHÈSE ================= */

#synthese {
  background: #111;
  color: #fff;

  padding: 20px;
  border-radius: 12px;

  box-shadow: 0 0 15px rgba(57,183,199,0.5);

  animation: fadeInUp 1s ease;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 768px) {

  body {
    background: linear-gradient(180deg, #000, #444);
  }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden; /* 🔥 empêche le décalage */
  padding-top: 20px ;
}
  .container21 {
    width: 84%;
    padding: 20px;
    margin-top: 20px;
    
  }
  textarea{
    width: 90%;
  }

  header {
    font-size: 1.1rem;
  }

  button {
    font-size: 0.95rem;
    padding: 10px;
  }

  input, select, textarea {
    font-size: 0.95rem;
  }
  select{
    width: 95%;
  }
}

@media (min-width: 769px) {

  .container21 {
    max-width: 900px;

  }

  input, select, textarea {
    font-size: 17px;
  }
}


  </style>













</head>
<body>

<div class="container21">
  <header><strong id="serviceHeader">Service SPL</strong></header>

  <form id="formulaire">
    <!-- Défini ton service ici -->
    <input type="hidden" id="serviceAffiche" value="Transfert de données vers le cloud">

    <input type="hidden" id="nom">
    <input type="hidden" id="prenom">
    <input type="hidden" id="numero">

    <h2 style="color: var(--neon-green);">Détails de la demande</h2>

    <label for="marque">Sélectionnez le modèle/appareil :</label>
    <select name="marque" id="marque" required>
      <option value="">-- Choisir --</option>
      <option value="Option1">Option 1</option>
      <option value="Option2">Option 2</option>
      <option value="Autre">Autre...</option>
    </select>

    <input type="text" id="autreMarque" name="autreMarque" placeholder="Entrez la marque" style="display:none; margin-top:10px;">

    <label for="detailsDemande" style="margin-top:25px; display:block;">Précisions :</label>
    <textarea id="detailsDemande" placeholder="Ex: Documents volumineux, HP Deskjet 3510, Serveur XYZ..." required></textarea>

    <button type="button" id="valider" style="margin-top: 20px;">Valider la commande</button>
  </form>

  <div id="synthese" style="display:none; margin-top:20px; color: white;">
    <h3>Vérifiez vos informations</h3>
    <p><strong>Service:</strong> <span id="rService"></span></p>
    <p><strong>Mail:</strong> <span id="rNom"></span></p>
    <p><strong>Marque:</strong> <span id="rMarque"></span></p>
    <p><strong>Détails:</strong> <span id="rDetails"></span></p>
    
    <div class="buttons">
      <button type="button" id="confirmer">Confirmer & WhatsApp</button>
      <button type="button" id="modifier">Modifier</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ccsrxvwaxkdbphesyies.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_SqgQjncAuFW7c5buXtpdsw_oWUuez1z";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

const safeGet = id => document.getElementById(id);

// Vérifier session
async function verifierSession() {
  try {
    const { data, error } = await supabaseClient.auth.getSession();
    if (error || !data.session?.user) {
      window.location.href = "login.html";
      return null;
    }
    const user = data.session.user;
    return {
      email: user.email,
      id: user.id,
      username: user.user_metadata?.full_name || user.email
    };
  } catch(e) {
    console.error(e);
    window.location.href = "login.html";
    return null;
  }
}

// Préparer synthèse
function preparerSynthese(user) {
  const service = safeGet('serviceAffiche').value || "Service inconnu";
  const marqueSelect = safeGet('marque');
  const marque = marqueSelect.value === 'Autre' ? safeGet('autreMarque').value : marqueSelect.value;
  const details = safeGet('detailsDemande').value || "";

  safeGet('rService').textContent = service;
  safeGet('rNom').textContent = user.username;
  safeGet('rMarque').textContent = marque;
  safeGet('rDetails').textContent = details;

  safeGet('formulaire').style.display = 'none';
  safeGet('synthese').style.display = 'block';
}

// Envoyer la requête et WhatsApp
async function envoyerRequete(user) {
  try {
    const service = safeGet('rService').textContent;
    const marque = safeGet('rMarque').textContent;
    const details = safeGet('rDetails').textContent;

    // Récup utilisateur
    const { data: utilisateur, error: errUser } = await supabaseClient
      .from('utilisateur')
      .select('mat_user, pseudo_user, mail_user')
      .eq('mail_user', user.email)
      .maybeSingle();
    
    if (errUser || !utilisateur) return alert("Utilisateur non trouvé.");
// Récup compte
    const { data: compte, error: errCompte } = await supabaseClient
      .from('compte')
      .select('num_cpt')
      .eq('mat_user', utilisateur.mat_user)
      .maybeSingle();
    if (errCompte || !compte) return alert("Compte non trouvé.");

    // Préparer et insérer la requête
    const dossier = {
      nom_rqt: service,
      lib_rqt: `Marque: ${marque}\nDétails: ${details}`,
      num_cpt: compte.num_cpt,
      status: 'pending',
      progress: 0,
      date_rqt: new Date().toISOString()
    };

    const { data: inserted, error: insertErr } = await supabaseClient
      .from('requete')
      .insert([dossier])
      .select()
      .single();
    if (insertErr) return alert("Erreur serveur: " + insertErr.message);

    // WhatsApp
    const phone = '241074849344';
    const msg = `Bonjour SPIRIT, je suis ${utilisateur.pseudo_user}. Demande de ${service} pour ${marque}. Détails : ${details}`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');

    alert("✅ Requête envoyée !");
    window.location.href = 'dashboard.html';
  } catch(e) {
    console.error(e);
    alert("Erreur inattendue, voir console.");
  }
}

// DOM Ready
document.addEventListener('DOMContentLoaded', async () => {
  const user = await verifierSession();
  if (!user) return;

  const marqueSelect = safeGet('marque');
  const autreChamp = safeGet('autreMarque');
  if (marqueSelect && autreChamp) {
    marqueSelect.addEventListener('change', () => {
      autreChamp.style.display = marqueSelect.value === 'Autre' ? 'block' : 'none';
      autreChamp.required = marqueSelect.value === 'Autre';
    });
  }

  safeGet('valider')?.addEventListener('click', () => preparerSynthese(user));
  safeGet('modifier')?.addEventListener('click', () => {
    safeGet('formulaire').style.display = 'block';
    safeGet('synthese').style.display = 'none';
  });
  safeGet('confirmer')?.addEventListener('click', () => envoyerRequete(user));
});
</script>
</body>
