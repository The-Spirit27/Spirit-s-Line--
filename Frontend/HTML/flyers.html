<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../CSS/saisies.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyers - SPIRIT</title>
</head>

<body>
  <div class="container25">
    <header><strong>Création de Flyers</strong></header>

    <form id="formulaire">
      <input type="hidden" id="serviceAffiche" value="Création de Flyers">

      <h2 style="color: var(--neon-green);">Détails de la demande</h2>

      <label for="marque">Type d'évennement:</label>
      <select id="marque" required>
        <option value="">-- Choisir --</option>
        <option value="Anniversaire">Anniversaire</option>
        <option value="Mariage">Mariage</option>
        <option value="Publicité">Publicité</option>
        <option value="Autre">Autre...</option>
      </select>

      <input type="text" id="autreMarque" placeholder="Précisez" style="display:none; margin-top:10px;">

      <label style="margin-top:25px;">Plus d'informations :</label>
      <textarea id="detailsDemande" required></textarea>

      <button type="button" id="valider">Valider la commande</button>
    </form>

    <div id="synthese" style="display:none; color:white;">
      <h3>Vérifiez vos informations</h3>

      <p><strong>Service:</strong> <span id="rService"></span></p>
      <p><strong>Utilisateur:</strong> <span id="rNom"></span></p>
      <p><strong>Type:</strong> <span id="rMarque"></span></p>
      <p><strong>Détails:</strong> <span id="rDetails"></span></p>
      <p><strong>Prix:</strong> <span id="rPrix"></span></p>

      <button id="confirmer">Confirmer</button>
      <button id="modifier">Modifier</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://ccsrxvwaxkdbphesyies.supabase.co",
 "sb_publishable_SqgQjncAuFW7c5buXtpdsw_oWUuez1z"
);

const safeGet = id => document.getElementById(id);

// 🔐 SESSION
async function verifierSession() {
  const { data } = await supabaseClient.auth.getSession();
  if (!data.session) {
    window.location.href = "login.html";
    return null;
  }
  return {
    email: data.session.user.email,
    username: data.session.user.email
  };
}

// 💰 PRIX
function calculerPrixFlyer() {
  const type = safeGet('marque').value;

  switch(type) {
    case "Anniversaire": return 5000;
    case "Mariage": return 7000;
    case "Publicité": return 10000;
    case "Autre": return 6000;
    default: return 0;
  }
}

// 📊 SYNTHÈSE
function preparerSynthese(user) {
  const service = safeGet('serviceAffiche').value;

  const marque = safeGet('marque').value === "Autre"
    ? safeGet('autreMarque').value
    : safeGet('marque').value;

  const details = safeGet('detailsDemande').value;
  const prix = calculerPrixFlyer();

  safeGet('rService').textContent = service;
  safeGet('rNom').textContent = user.username;
  safeGet('rMarque').textContent = marque;
  safeGet('rDetails').textContent = details;
  safeGet('rPrix').textContent = prix + " FCFA";

  safeGet('formulaire').style.display = "none";
  safeGet('synthese').style.display = "block";
}

// 🚀 ENVOI
async function envoyerRequete(user) {
  const service = safeGet('rService').textContent;
  const marque = safeGet('rMarque').textContent;
  const details = safeGet('rDetails').textContent;
  const prix = calculerPrixFlyer();

  const { data: utilisateur } = await supabaseClient
    .from('utilisateur')
    .select('mat_user, pseudo_user')
    .eq('mail_user', user.email)
    .single();

  const { data: compte } = await supabaseClient
    .from('compte')
    .select('num_cpt')
    .eq('mat_user', utilisateur.mat_user)
    .single();

  await supabaseClient.from('requete').insert([{
    nom_rqt: service,
    lib_rqt: `Type: ${marque}\n${details}`,
    num_cpt: compte.num_cpt,
    prix: prix,
    status: "pending",
    progress: 0,
    date_rqt: new Date().toISOString()
  }]);

  const msg = `Bonjour, demande de ${service}
Type: ${marque}
Détails: ${details}
Prix: ${prix} FCFA`;
window.open(`https://wa.me/241074849344?text=${encodeURIComponent(msg)}`);

  alert("Commande envoyée !");
  window.location.href = "dashboard.html";
}

// 🎯 INIT
document.addEventListener('DOMContentLoaded', async () => {
  const user = await verifierSession();
  if (!user) return;

  safeGet('marque').addEventListener('change', () => {
    safeGet('autreMarque').style.display =
      safeGet('marque').value === "Autre" ? "block" : "none";
  });

  safeGet('valider').addEventListener('click', () => {
    if (!safeGet('marque').value || !safeGet('detailsDemande').value) {
      return alert("Remplis tous les champs");
    }
    preparerSynthese(user);
  });

  safeGet('modifier').addEventListener('click', () => {
    safeGet('formulaire').style.display = "block";
    safeGet('synthese').style.display = "none";
  });

  safeGet('confirmer').addEventListener('click', () => envoyerRequete(user));
});
</script>
</body>
</html>
